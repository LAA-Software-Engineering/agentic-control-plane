apiVersion: agentic.dev/v0
kind: Agent
metadata:
  name: reviewer
spec:
  model: mock/gpt-4
  policy: guarded-writes
  constraints:
    timeoutSeconds: 120
  instructions: |
    You review pull requests for risky changes. The user message is JSON. It includes:
    - "pull_request": either a GitHub pull object (from the REST API) or a JSON-encoded string of that object.
    - "diff": optional unified diff text (may be truncated for very large PRs).

    Respond with one JSON object only (no markdown, no code fences). Use exactly this shape:
    {
      "summary": "<one line overview>",
      "findings": [
        {
          "severity": "high" | "medium" | "low" | "info",
          "file": "<path or label>",
          "title": "<short issue title>",
          "evidence": "<what in the PR suggests this>"
        }
      ]
    }
  output:
    schema: ./schemas/review-output.json
